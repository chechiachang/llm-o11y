name: Docker Compose Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  env-coverage:
    name: Validate env var coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check all env vars have defaults
        run: |
          # Find ${VAR} without a default (i.e. not ${VAR:-...}) in docker-compose.yml.
          # $$ is Docker Compose's escape for a literal $ passed to the shell; replace it
          # with a placeholder so those patterns are not flagged as missing defaults.
          MISSING=$(sed 's/\$\$/ESCAPED_DOLLAR/g' docker-compose.yml | \
            grep -oE '\$\{[A-Z_0-9]+\}' | tr -d '${}' || true)
          if [ -n "$MISSING" ]; then
            echo "FAIL: The following env vars have no default value:"
            echo "$MISSING"
            exit 1
          fi
          echo "PASS: All env vars in docker-compose.yml use \${VAR:-default} syntax."

      - name: List all env vars and their defaults
        run: |
          echo "=== Env vars defined in docker-compose.yml ==="
          grep -oE '\$\{[A-Z_0-9]+:-[^}]*\}' docker-compose.yml | sort -u

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGFUSE_PUBLIC_KEY: pk-00000000
      LANGFUSE_SECRET_KEY: sk-00000000
    steps:
      - uses: actions/checkout@v4

      - name: Enable QEMU (arm64 image support for bifrost)
        uses: docker/setup-qemu-action@v3

      # bifrost image is arm64-only; QEMU above enables emulation on amd64 CI.
      - name: Start core services
        run: docker compose up -d postgres redis minio clickhouse langfuse-web langfuse-worker bifrost

      - name: Wait for infrastructure services to be healthy
        run: |
          for service in postgres redis minio clickhouse; do
            echo "Waiting for $service to be healthy..."
            timeout 120 bash -c "
              until docker inspect \$(docker compose ps -q $service) \
                    --format='{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; do
                sleep 5
              done
            "
            echo "$service is healthy"
          done

      - name: Wait for Langfuse web to be ready
        run: |
          echo "Waiting for langfuse-web API..."
          timeout 180 bash -c '
            until curl -fsS http://localhost:3000/api/public/health >/dev/null 2>&1; do
              sleep 10
            done
          '
          echo "langfuse-web is ready"

      - name: Wait for Bifrost API to be ready
        run: |
          echo "Waiting for bifrost API..."
          timeout 180 bash -c '
            until curl -fsS http://localhost:8080/v1/models >/dev/null 2>&1; do
              sleep 5
            done
          '
          echo "bifrost is ready"

      - name: Show service status
        run: docker compose ps

      - name: Required env for Bifrost/Langfuse E2E test
        run: |
          echo "Required env/secrets:"
          echo "- AZURE_OPENAI_API_KEY"
          echo "- AZURE_ENDPOINT"
          echo "Optional alternative:"
          echo "- OPENAI_API_KEY (if using openai provider in bifrost config)"
          echo "Langfuse API auth used by test (defaults in this repo):"
          echo "- LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}"
          echo "- LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}"

      # ── Individual service checks ──────────────────────────────────────────
      # All test steps use continue-on-error: true so every test always runs.
      # The "Test Summary" step at the end fails the job if any test failed.

      - name: ClickHouse ping
        id: test-clickhouse-ping
        continue-on-error: true
        run: curl -fsS http://127.0.0.1:8123/ping

      - name: ClickHouse query (SELECT 1)
        id: test-clickhouse-query
        continue-on-error: true
        run: |
          RESULT=$(curl -fsS \
            --user "${CLICKHOUSE_USER:-chechia}:${CLICKHOUSE_PASSWORD:-password}" \
            'http://127.0.0.1:8123/?query=SELECT%201')
          echo "ClickHouse response: $RESULT"
          [ "$RESULT" = "1" ]

      - name: MinIO health (live)
        id: test-minio-health
        continue-on-error: true
        run: |
          echo "--- MinIO /minio/health/live ---"
          curl -vS http://localhost:9002/minio/health/live 2>&1 || true
          echo ""
          echo "--- MinIO /minio/health/ready ---"
          curl -vS http://localhost:9002/minio/health/ready 2>&1 || true
          # Require liveness to pass
          curl -fsS http://localhost:9002/minio/health/live

      - name: MinIO bucket list (langfuse bucket exists)
        id: test-minio-bucket
        continue-on-error: true
        run: |
          MINIO_CONTAINER=$(docker compose ps -q minio)
          echo "MinIO container ID: $MINIO_CONTAINER"
          # Configure mc alias with credentials (the default 'local' alias has no creds)
          docker exec "$MINIO_CONTAINER" mc alias set myminio \
            http://localhost:9000 \
            "${MINIO_ROOT_USER:-chechia}" \
            "${MINIO_ROOT_PASSWORD:-password}" 2>&1
          echo "--- mc ls myminio ---"
          docker exec "$MINIO_CONTAINER" mc ls myminio 2>&1
          echo "--- mc ls myminio/langfuse ---"
          docker exec "$MINIO_CONTAINER" mc ls myminio/langfuse 2>&1
          # Verify the langfuse bucket exists
          docker exec "$MINIO_CONTAINER" mc ls myminio/langfuse

      - name: Redis ping (authenticated)
        id: test-redis-ping
        continue-on-error: true
        run: |
          REDIS_CONTAINER=$(docker compose ps -q redis)
          RESPONSE=$(docker exec "$REDIS_CONTAINER" redis-cli -a password ping 2>/dev/null)
          echo "Redis response: $RESPONSE"
          [ "$RESPONSE" = "PONG" ]

      - name: Redis set/get (read-write)
        id: test-redis-readwrite
        continue-on-error: true
        run: |
          REDIS_CONTAINER=$(docker compose ps -q redis)
          docker exec "$REDIS_CONTAINER" redis-cli -a password SET ci-test-key ci-test-value 2>/dev/null
          VALUE=$(docker exec "$REDIS_CONTAINER" redis-cli -a password GET ci-test-key 2>/dev/null)
          echo "Redis GET ci-test-key: $VALUE"
          [ "$VALUE" = "ci-test-value" ]
          docker exec "$REDIS_CONTAINER" redis-cli -a password DEL ci-test-key 2>/dev/null

      - name: Postgres ready check
        id: test-postgres-ready
        continue-on-error: true
        run: |
          POSTGRES_CONTAINER=$(docker compose ps -q postgres)
          docker exec "$POSTGRES_CONTAINER" sh -c 'pg_isready -U postgres -d postgres'

      - name: Postgres query (SELECT 1)
        id: test-postgres-query
        continue-on-error: true
        run: |
          POSTGRES_CONTAINER=$(docker compose ps -q postgres)
          RESULT=$(docker exec "$POSTGRES_CONTAINER" \
            psql -U postgres -d postgres -tAc 'SELECT 1')
          echo "Postgres response: $RESULT"
          [ "$RESULT" = "1" ]

      - name: Langfuse health endpoint
        id: test-langfuse-health
        continue-on-error: true
        run: curl -fsS http://localhost:3000/api/public/health

      - name: Langfuse UI responds (HTTP 200 or redirect)
        id: test-langfuse-ui
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:3000/)
          echo "Langfuse UI HTTP code: $HTTP_CODE"
          echo "$HTTP_CODE" | grep -qE '^(200|302)$'

      - name: Langfuse authentication with default project keys
        id: test-langfuse-auth
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            -u 'pk-00000000:sk-00000000' \
            http://localhost:3000/api/public/projects)
          echo "Langfuse auth response: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: Langfuse authentication with default keys failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Langfuse worker health endpoint
        id: test-langfuse-worker
        continue-on-error: true
        run: |
          # The worker health endpoint may not always be reachable; treat as non-critical.
          curl -fsS http://127.0.0.1:3030/api/public/health \
            && echo "Worker health OK" \
            || echo "Worker health endpoint not available (non-critical)"

      - name: Bifrost -> real LLM call -> Langfuse observation verify
        id: test-bifrost-langfuse-e2e
        if: ${{ env.AZURE_OPENAI_API_KEY != '' && env.AZURE_ENDPOINT != '' }}
        continue-on-error: true
        env:
          BIFROST_PROVIDER: azure
          BIFROST_MODEL: azure/gpt-5.4-nano
          BIFROST_BASE_URL: http://localhost:8080
          LANGFUSE_BASE_URL: http://localhost:3000
        run: ./scripts/test-bifrost-langfuse-e2e.sh

      - name: Bifrost/Langfuse E2E skipped (missing Azure secrets)
        if: ${{ !(env.AZURE_OPENAI_API_KEY != '' && env.AZURE_ENDPOINT != '') }}
        run: |
          echo "SKIP: Missing AZURE_OPENAI_API_KEY or AZURE_ENDPOINT."
          echo "Set repo secrets to enable real LLM + Langfuse observation test."

      # ── Test summary ──────────────────────────────────────────────────────
      # Print pass/fail for every test and fail the job if any required test failed.

      - name: Test summary
        if: always()
        run: |
          FAILED=0
          check() {
            if [ "$2" = "success" ]; then
              echo "  PASS  $1"
            else
              echo "  FAIL  $1"
              FAILED=$((FAILED + 1))
            fi
          }
          check_optional() {
            if [ "$2" = "success" ]; then
              echo "  PASS  $1"
            elif [ "$2" = "skipped" ]; then
              echo "  INFO  $1: skipped"
            else
              echo "  FAIL  $1"
              FAILED=$((FAILED + 1))
            fi
          }
          echo ""
          echo "=== Integration test results ==="
          check "ClickHouse ping"                   "${{ steps.test-clickhouse-ping.outcome }}"
          check "ClickHouse query (SELECT 1)"       "${{ steps.test-clickhouse-query.outcome }}"
          check "MinIO health"                      "${{ steps.test-minio-health.outcome }}"
          check "MinIO bucket (langfuse)"           "${{ steps.test-minio-bucket.outcome }}"
          check "Redis ping"                        "${{ steps.test-redis-ping.outcome }}"
          check "Redis set/get"                     "${{ steps.test-redis-readwrite.outcome }}"
          check "Postgres ready"                    "${{ steps.test-postgres-ready.outcome }}"
          check "Postgres query (SELECT 1)"         "${{ steps.test-postgres-query.outcome }}"
          check "Langfuse health"                   "${{ steps.test-langfuse-health.outcome }}"
          check "Langfuse UI"                       "${{ steps.test-langfuse-ui.outcome }}"
          check "Langfuse auth (default keys)"      "${{ steps.test-langfuse-auth.outcome }}"
          check_optional "Bifrost->LLM->Langfuse E2E" "${{ steps.test-bifrost-langfuse-e2e.outcome }}"
          # Worker health is non-critical — print but do not count as failure
          echo "  INFO  Langfuse worker health: ${{ steps.test-langfuse-worker.outcome }}"
          echo "================================"
          if [ "$FAILED" -gt 0 ]; then
            echo "$FAILED test(s) FAILED."
            exit 1
          fi
          echo "All tests passed."

      # ── Failure diagnostics ────────────────────────────────────────────────

      - name: Collect service logs on failure
        if: failure()
        run: |
          for svc in bifrost langfuse-web langfuse-worker clickhouse minio redis postgres; do
            echo "========== $svc logs =========="
            docker compose logs --tail=100 "$svc" || true
          done

      - name: Stop services
        if: always()
        run: docker compose down -v
